name: XFeed Bot – Auto Check

on:
  schedule:
    # Chạy mỗi 4 giờ (6 lần/ngày)
    - cron: '0 */4 * * *'
  workflow_dispatch:  # Cho phép chạy thủ công

jobs:
  check-feeds:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      # Restore seen_posts.json từ cache để không gửi lại bài cũ
      - name: 📂 Restore seen posts cache
        uses: actions/cache@v4
        with:
          path: data/seen_posts.json
          key: seen-posts-${{ github.run_id }}
          restore-keys: |
            seen-posts-

      # Restore twikit cookies để không đăng nhập lại mỗi lần
      - name: 🍪 Restore cookies cache
        uses: actions/cache@v4
        with:
          path: data/cookies.json
          key: x-cookies-${{ github.run_id }}
          restore-keys: |
            x-cookies-

      - name: 🚀 Run XFeed Bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.XFEED_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          X_USERNAME: ${{ secrets.X_USERNAME }}
          X_EMAIL: ${{ secrets.X_EMAIL }}
          X_PASSWORD: ${{ secrets.X_PASSWORD }}
        run: python run_once.py
